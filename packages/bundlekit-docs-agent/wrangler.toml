name = "bundlekit-docs-agent"
main = "dist/worker-rag.js"
compatibility_date = "2026-05-25"

# 环境变量
[vars]
ENVIRONMENT = "production"
EMBEDDING_MODEL = "@cf/baai/bge-base-en-v1.5"
CHAT_MODEL = "@cf/meta/llama-3.1-8b-instruct"
VECTORIZE_INDEX_NAME = "bundlekit-docs"

# Cloudflare 服务绑定
[ai]
binding = "AI"

[vectorize]
binding = "VECTORIZE"
index_name = "bundlekit-docs"

# 构建配置
[build]
command = "pnpm build:worker"

# 路由配置（可选）
# routes = [
#   { pattern = "docs-agent.bundlekit.workers.dev", custom_domain = true }
# ]

# KV 命名空间（如果需要）
# [[kv_namespaces]]
# binding = "KV"
# id = "your-kv-namespace-id"

# D1 数据库（如果需要）
# [[d1_databases]]
# binding = "DB"
# database_name = "bundlekit-docs-agent"
# database_id = "your-d1-database-id"