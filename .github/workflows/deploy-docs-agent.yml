name: deploy-docs-agent

on:
  push:
    branches:
      - master
    paths:
      - 'packages/bundlekit-docs-agent/**'
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 pnpm 环境
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      # 3. 设置 Node.js 环境并开启 pnpm 缓存
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # 4. 安装依赖
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # 5. 验证 Secrets 是否正确配置
      - name: Check Secrets
        run: |
          if [ -z "$API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN is EMPTY or NOT SET"
            exit 1
          else
            echo "CLOUDFLARE_API_TOKEN exists, length=${#API_TOKEN}"
          fi
          if [ -z "$ACCOUNT_ID" ]; then
            echo "CLOUDFLARE_ACCOUNT_ID is EMPTY or NOT SET"
            exit 1
          else
            echo "CLOUDFLARE_ACCOUNT_ID exists, length=${#ACCOUNT_ID}"
          fi
        env:
          API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # 6. 构建项目
      - name: Build project
        run: pnpm build --filter=@bundlekit/docs-agent...

      # 7. 部署到 Cloudflare Workers
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          command: deploy --name=bundlekit-docs-agent --compatibility-date=2026-05-25