name: deploy-umi-docs

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 pnpm 环境
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      # 3. 设置 Node.js 环境并开启 pnpm 缓存
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # 4. 安装依赖（包含项目本地的 wrangler）
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # 5. 构建 Dumi 文档产物
      - name: Build Docs
        run: pnpm run build:docs

      # 6. 验证构建产物目录是否存在
      - name: Verify Build Artifacts
        run: ls -al ./packages/bundlekit-docs/dist

      # 7. 验证 Secrets 是否正确配置
      - name: Check Secrets
        run: |
          if [ -z "$API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN is EMPTY or NOT SET"
          else
            echo "CLOUDFLARE_API_TOKEN exists, length=${#API_TOKEN}"
          fi
          if [ -z "$ACCOUNT_ID" ]; then
            echo "CLOUDFLARE_ACCOUNT_ID is EMPTY or NOT SET"
          else
            echo "CLOUDFLARE_ACCOUNT_ID exists, length=${#ACCOUNT_ID}"
          fi
        env:
          API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # 8. ✨ 针对 Workers (Assets) 修复后的部署步骤
      - name: Deploy to Cloudflare Workers (Assets)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          # ⚠️ 注意 1：Workers 部署需要在根目录下执行命令，所以【不要】写 workingDirectory 切换目录
          # ⚠️ 注意 2：命令从 `pages deploy` 变更为 `deploy`
          # ⚠️ 注意 3：通过 `--assets` 参数指定你刚刚编译出来的静态产物路径
          # ⚠️ 注意 4：新版 Workers 资产部署必须显式带有兼容日期参数 `--compatibility-date`
          command: deploy --assets=./packages/bundlekit-docs/dist --name=bundle-bundlekit --compatibility-date=2026-05-19