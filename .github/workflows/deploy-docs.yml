name: Deploy Dumi Docs

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 pnpm 环境
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      # 3. 设置 Node.js 环境并开启 pnpm 缓存
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # 4. 安装依赖（包含项目本地的 wrangler）
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # 5. 构建 Dumi 文档产物
      - name: Build Docs
        run: pnpm run build:docs

      # 6. 验证构建产物目录是否存在（防止因打包路径不对导致后续报错，CI 日志中可查）
      - name: Verify Build Artifacts
        run: ls -al ./packages/devkit-docs/dist

      # 7. 验证 Secrets 是否正确配置
      - name: Check Secrets
        run: |
          if [ -z "$API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN is EMPTY or NOT SET"
          else
            echo "CLOUDFLARE_API_TOKEN exists, length=${#API_TOKEN}"
          fi
          if [ -z "$ACCOUNT_ID" ]; then
            echo "CLOUDFLARE_ACCOUNT_ID is EMPTY or NOT SET"
          else
            echo "CLOUDFLARE_ACCOUNT_ID exists, length=${#ACCOUNT_ID}"
          fi
        env:
          API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # 8. 部署到 Cloudflare Pages
      # ✨ 显式注入参数版：拒绝自动获取 Account ID
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          packageManager: pnpm
          workingDirectory: './packages/devkit-docs/dist'
          # 💡 核心修改：将 accountId 挪到 secrets 传参中，直接硬编码进 command 后面
          command: pages deploy . --project-name=bundle-devkit --account-id=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}