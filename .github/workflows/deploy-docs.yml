name: Deploy Dumi Docs

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 pnpm 环境
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      # 3. 设置 Node.js 环境并开启 pnpm 缓存
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # 4. 安装依赖（包含项目本地的 wrangler）
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # 5. 构建 Dumi 文档产物
      - name: Build Docs
        run: pnpm run build:docs

      # 6. 验证构建产物目录是否存在（防止因打包路径不对导致后续报错，CI 日志中可查）
      - name: Verify Build Artifacts
        run: ls -al ./packages/devkit-docs/dist

      # 7. 部署到 Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 告诉 Action 使用项目内置的 pnpm wrangler，不再全新下载
          packageManager: pnpm
          # 将工作目录直接切到产物文件所在夹
          workingDirectory: './packages/devkit-docs/dist'
          # 在当前目录下执行部署。⚠️请把下面的 <你的PROJECT_NAME> 替换为你在 Cloudflare Pages 上真实的项目名称
          command: pages deploy . --project-name=bundle-devkit